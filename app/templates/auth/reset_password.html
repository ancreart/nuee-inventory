<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Nuée — Nueva Contraseña</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex;
           align-items: center; justify-content: center;
           background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; }
    .auth-card { background: white; border-radius: 24px;
                 box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
                 width: 100%; max-width: 440px; padding: 48px; }
    [data-theme="dark"] .auth-card { background: #1e293b; color: #f8fafc; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="text-center mb-4">
      <div style="width:72px;height:72px;background:linear-gradient(135deg,#2563eb,#7c3aed);
                  border-radius:18px;display:inline-flex;align-items:center;
                  justify-content:center;font-size:36px;margin-bottom:16px;">
        <i class="bi bi-key" style="color:white;"></i>
      </div>
      <h2 style="font-family:'Poppins',sans-serif;font-weight:700;">Nueva contraseña</h2>
      <p class="text-muted">Elige una contraseña segura</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} py-2">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label fw-semibold">Nueva contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control form-control-lg"
            placeholder="Mínimo 6 caracteres" minlength="6" required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Confirmar contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="confirm_password" class="form-control form-control-lg"
            placeholder="Repite la contraseña" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-lg fw-semibold">
        <i class="bi bi-check-circle me-2"></i>Guardar contraseña
      </button>
    </form>
  </div>
  <script>
    const t = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
  </script>
</body>
</html>
